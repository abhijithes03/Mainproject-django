
{% extends 'common/base3.html' %}

{% block content %}

<style>

body{
    background-color:#f8f9fa;
    padding-top:40px;
}

/* CONTAINER */

.edit-container{
    max-width:750px;
    background-color:#ffffff;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.edit-container:hover{
    transform:translateY(-3px);
}

/* TITLE */

.page-title{
    font-size:34px;
    font-weight:700;
    color:#111;
}

/* INPUT FIELDS */

.form-control{
    border:1px solid #555;
    border-radius:10px;
    height:48px;
    box-shadow:none !important;
    font-size:15px;
    padding:10px 14px;
}

.form-control:focus{
    border:1px solid #000;
    box-shadow:none;
}

/* LABELS */

.form-label{
    font-weight:600;
    margin-bottom:8px;
    font-size:15px;
    color:#111;
}

/* PROFILE IMAGE */

.profile-img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:3px solid #000;
}

/* RADIO BUTTONS */

.gender-box{
    display:flex;
    gap:20px;
    margin-top:10px;
    font-size:15px;
    font-weight:500;
}

/* BUTTON */

.submit-btn{
    background-color:#000;
    color:#fff;
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
    font-size:15px;
}

.submit-btn:hover{
    background-color:#333;
}

/* MOBILE */

@media(max-width:576px){

    body{
        padding-top:20px;
    }

    .edit-container{
        padding:20px !important;
        border-radius:16px;
    }

    .page-title{
        font-size:26px;
    }

    .profile-img{
        width:90px;
        height:90px;
    }

    .form-control{
        height:42px;
        font-size:14px;
        padding:8px 12px;
    }

    .form-label{
        font-size:14px;
    }

    .gender-box{
        flex-direction:column;
        gap:10px;
        font-size:14px;
    }

    .submit-btn{
        width:100%;
        font-size:14px;
        padding:11px 18px;
    }

}

/* TABLET */

@media(min-width:577px) and (max-width:991px){

    .edit-container{
        max-width:850px;
        padding:30px !important;
    }

    .page-title{
        font-size:32px;
    }

    .profile-img{
        width:110px;
        height:110px;
    }

    .form-control{
        height:50px;
        font-size:15px;
    }

    .form-label{
        font-size:15px;
    }

    .submit-btn{
        font-size:15px;
        padding:12px 26px;
    }

}

/* NORMAL LAPTOP */

@media(min-width:992px) and (max-width:1439px){

    .edit-container{
        max-width:1000px;
        padding:40px !important;
        border-radius:24px;
    }

    .page-title{
        font-size:42px;
        margin-bottom:35px !important;
    }

    .profile-img{
        width:150px;
        height:150px;
        border-width:4px;
    }

    .form-control{
        height:58px;
        font-size:17px;
        border-radius:12px;
        padding:12px 16px;
    }

    .form-label{
        font-size:17px;
        margin-bottom:10px;
    }

    .gender-box{
        gap:30px;
        font-size:17px;
    }

    .submit-btn{
        font-size:18px;
        padding:14px 36px;
        border-radius:12px;
    }

}

/* LARGE LAPTOP */

@media(min-width:1440px){

    .edit-container{
        max-width:1250px;
        padding:55px !important;
        border-radius:30px;
    }

    .page-title{
        font-size:52px;
        margin-bottom:45px !important;
    }

    .profile-img{
        width:190px;
        height:190px;
        border-width:5px;
    }

    .form-control{
        height:68px;
        font-size:20px;
        border-radius:14px;
        padding:14px 18px;
    }

    .form-label{
        font-size:20px;
        margin-bottom:12px;
    }

    .gender-box{
        gap:40px;
        font-size:20px;
    }

    .submit-btn{
        font-size:22px;
        padding:16px 42px;
        border-radius:14px;
    }

}

/* 4K SCREEN */

@media(min-width:2560px){

    body{
        padding-top:70px;
    }

    .edit-container{
        max-width:1800px;
        padding:80px !important;
        border-radius:40px;
    }

    .page-title{
        font-size:78px;
        margin-bottom:60px !important;
    }

    .profile-img{
        width:280px;
        height:280px;
        border-width:7px;
    }

    .form-control{
        height:95px;
        font-size:30px;
        border-radius:20px;
        padding:18px 26px;
    }

    .form-label{
        font-size:30px;
        margin-bottom:18px;
    }

    .gender-box{
        gap:60px;
        font-size:30px;
        margin-top:18px;
    }

    .submit-btn{
        font-size:32px;
        padding:22px 60px;
        border-radius:18px;
        margin-top:20px;
    }

    .mb-4{
        margin-bottom:2.5rem !important;
    }

}

</style>



<div class="container mt-5 mb-5 p-4 edit-container">

    <h2 class="text-center mb-4 page-title">
        Edit Profile
    </h2>

    <form action="{% url 'profileedit' %}"
          method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}



        <!-- PROFILE PHOTO -->

        <div class="text-center mb-4">

            {% if data.profilephoto %}

                <img src="{{data.profilephoto.url}}"
                     class="profile-img">

            {% endif %}

        </div>



        <!-- FIRST NAME -->

        <div class="mb-4">

            <label for="fname" class="form-label">
                First Name
            </label>

            <input type="text"
                   name="fname"
                   id="fname"
                   value="{{data.user.first_name}}"
                   class="form-control"
                   required>

        </div>



        <!-- LAST NAME -->

        <div class="mb-4">

            <label for="lname" class="form-label">
                Last Name
            </label>

            <input type="text"
                   name="lname"
                   id="lname"
                   value="{{data.user.last_name}}"
                   class="form-control"
                   required>

        </div>



        <!-- EMAIL -->

        <div class="mb-4">

            <label for="email" class="form-label">
                Email
            </label>

            <input type="email"
                   name="email"
                   id="email"
                   value="{{data.user.email}}"
                   class="form-control"
                   required>

        </div>



        <!-- GENDER -->

        <div class="mb-4">

            <label class="form-label">
                Gender
            </label>

            <div class="gender-box">

                {% if data.gender == 'male' %}

                    <div>
                        <input type="radio"
                               name="gender"
                               value="male"
                               checked>
                        Male
                    </div>

                    <div>
                        <input type="radio"
                               name="gender"
                               value="female">
                        Female
                    </div>

                {% else %}

                    <div>
                        <input type="radio"
                               name="gender"
                               value="male">
                        Male
                    </div>

                    <div>
                        <input type="radio"
                               name="gender"
                               value="female"
                               checked>
                        Female
                    </div>

                {% endif %}

            </div>

        </div>



        <!-- ADDRESS -->

        <div class="mb-4">

            <label class="form-label">
                Address
            </label>

            <input type="text"
                   name="address"
                   value="{{data.address}}"
                   class="form-control"
                   required>

        </div>



        <!-- CITY -->

        <div class="mb-4">

            <label class="form-label">
                City
            </label>

            <input type="text"
                   name="city"
                   value="{{data.city}}"
                   class="form-control"
                   required>

        </div>



        <!-- STATE -->

        <div class="mb-4">

            <label class="form-label">
                State
            </label>

            <input type="text"
                   name="state"
                   value="{{data.state}}"
                   class="form-control"
                   required>

        </div>



        <!-- POSTAL CODE -->

        <div class="mb-4">

            <label class="form-label">
                Postal Code
            </label>

            <input type="text"
                   name="poscode"
                   value="{{data.postalcode}}"
                   class="form-control"
                   required>

        </div>



        <!-- PHONE -->

        <div class="mb-4">

            <label class="form-label">
                Phone Number
            </label>

            <input type="text"
                   name="phone"
                   value="{{data.phonenumber}}"
                   class="form-control"
                   required>

        </div>



        <!-- PHOTO -->

        <div class="mb-4">

            <label class="form-label">
                Profile Photo
            </label>

            <input type="file"
                   name="pphoto"
                   class="form-control">

        </div>



        <!-- SUBMIT BUTTON -->

        <div class="text-center mt-4">

            <input type="submit"
                   value="Update Profile"
                   class="submit-btn">

        </div>

    </form>

</div>

{% endblock %}
