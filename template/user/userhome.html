{%extends 'common/base2.html'%}

{% block content%}

<style>

/* BODY */

body{
    background-color:#ffffff;
    margin-top:90px;
}

/* CONTAINER */

.custom-container{
    background-color:#ffffff;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}

/* CARD */

.card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 4px 14px rgba(0,0,0,0.10);
    background-color:#fff;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* IMAGE */

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* CARD BODY */

.card-body{
    padding:18px;
}

.card-body h6{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
}

.card-body p{
    margin-bottom:8px;
    font-size:15px;
}

/* BUY BUTTON */

.buy{
    padding:9px 22px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.buy:hover{
    transform:translateY(-2px);
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* WISHLIST ICON */

.wishlist-icon{
    font-size:22px;
    z-index:10;
}

/* MOBILE */

@media(max-width:576px){

    body{
        margin-top:75px;
    }

    .custom-container{
        border-radius:14px;
    }

    .row{
        padding-left:8px !important;
        padding-right:8px !important;
    }

    .card{
        border-radius:14px;
    }

    .card img{
        height:160px;
    }

    .card-body{
        padding:12px;
    }

    .card-body h6{
        font-size:14px;
    }

    .card-body p{
        font-size:13px;
    }

    .buy{
        padding:7px 16px;
        font-size:13px;
    }

    .wishlist-icon{
        font-size:18px;
    }

}

/* TABLET */

@media(min-width:577px) and (max-width:991px){

    .custom-container{
        max-width:920px;
    }

    .card img{
        height:210px;
    }

    .card-body h6{
        font-size:16px;
    }

    .card-body p{
        font-size:14px;
    }

    .buy{
        padding:8px 18px;
        font-size:14px;
    }

}

/* NORMAL LAPTOP */

@media(min-width:992px) and (max-width:1439px){

    .custom-container{
        max-width:1380px;
    }

    .card{
        border-radius:18px;
    }

    .card img{
        height:240px;
    }

    .card-body{
        padding:18px;
    }

    .card-body h6{
        font-size:18px;
    }

    .card-body p{
        font-size:15px;
    }

    .buy{
        padding:10px 22px;
        font-size:15px;
    }

}

/* LARGE LAPTOP */

@media(min-width:1440px){

    .custom-container{
        max-width:1650px;
    }

    .row{
        padding-left:28px !important;
        padding-right:28px !important;
    }

    .card{
        border-radius:22px;
    }

    .card img{
        height:320px;
    }

    .card-body{
        padding:24px;
    }

    .card-body h6{
        font-size:24px;
    }

    .card-body p{
        font-size:18px;
    }

    .buy{
        padding:12px 28px;
        font-size:17px;
        border-radius:12px;
    }

    .wishlist-icon{
        font-size:28px;
    }

}

/* 4K SCREEN */

@media(min-width:2560px){

    body{
        margin-top:130px;
    }

    .custom-container{
        max-width:2350px;
        border-radius:32px;
        padding-top:30px;
        padding-bottom:30px;
    }

    .row{
        padding-left:40px !important;
        padding-right:40px !important;
        row-gap:40px !important;
    }

    .card{
        border-radius:28px;
    }

    .card img{
        height:480px;
    }

    .card-body{
        padding:34px;
    }

    .card-body h6{
        font-size:34px;
        margin-bottom:18px;
    }

    .card-body p{
        font-size:26px;
        margin-bottom:14px;
    }

    .buy{
        padding:16px 38px;
        font-size:24px;
        border-radius:16px;
    }

    .wishlist-icon{
        font-size:40px;
        padding:16px !important;
    }

}

</style>

<body>

<div class="container py-5 mb-5 custom-container">

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4 g-lg-5"
         style="padding-left:20px; padding-right:20px">

        {%for i in data%}

        <div class="col">

            <div class="card h-100">

                {% if i.id in w %}

                <a href="{% url 'wishlist' i.id %}"
                   class="position-absolute top-0 end-0 p-2 text-danger text-decoration-none wishlist-icon">

                   ❤️

                </a>

                {% else %}

                <a href="{% url 'wishlist' i.id %}"
                   class="position-absolute top-0 end-0 p-2 text-white text-decoration-none wishlist-icon">

                   🤍

                </a>

                {% endif %}

                <img src="{{i.perfume_image.url}}"
                     class="card-img-top">

                <div class="card-body text-center d-flex flex-column">

                    <h6>

                        {{i.perfumename}}

                    </h6>

                    <p>

                        {{i.perfume_category.category}}

                    </p>

                    <p>

                        {{i.perfume_price}}₹

                    </p>

                    <div class="mt-auto">

                        <p>

                            <a href="{% url 'details' i.id %}"
                               class="btn btn-warning buy">

                               Buy

                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

        {%endfor%}

    </div>

</div>

<a href="{%url 'logout'%}"></a>
<a href="{%url 'profileview'%}"></a>
<p><a href="{% url 'wishview'%}"></a></p>
<p><a href="{% url 'cartview' %}"></a></p>
<p><a href="{% url 'orders'%}"></a></p>

{%if messages%}

    {%for msg in messages%}

    <script>
        alert('{{msg}}');
    </script>

    {%endfor%}

{%endif%}

</body>

{%endblock%}
