
{% extends 'common/base3.html' %}

{% block content %}

<style>

body{
    padding-top:40px;
    background-color:#f8f9fa;
}

/* CONTAINER */

.payment-container{
    max-width:850px;
    background-color:#ffffff;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    overflow:hidden;
    padding:35px !important;
}

/* TITLE */

.payment-title{
    font-size:34px;
    font-weight:700;
}

/* TABLE */

.table{
    vertical-align:middle;
    margin-bottom:0;
}

.table th{
    background-color:#000;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:16px;
    font-weight:600;
}

.table td{
    text-align:center;
    padding:18px 10px;
    font-weight:500;
    font-size:15px;
}

/* IMAGE */

.payment-img{
    width:70px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}

/* GRAND TOTAL */

.total-box{
    font-size:24px;
    font-weight:700;
    text-align:right;
    margin-top:25px;
}

/* BUTTONS */

.payment-buttons{
    margin-top:40px;
}

.payment-btn{
    background-color:#000;
    color:#fff;
    border:none;
    padding:12px 28px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
    font-size:15px;
}

.payment-btn:hover{
    background-color:#333;
    color:#fff;
}

/* MOBILE */

@media(max-width:576px){

    body{
        padding-top:20px;
    }

    .payment-container{
        padding:20px !important;
        border-radius:14px;
    }

    .payment-title{
        font-size:24px;
    }

    .table th,
    .table td{
        font-size:13px;
        white-space:nowrap;
        padding:10px 8px;
    }

    .payment-img{
        width:55px;
        height:70px;
    }

    .total-box{
        font-size:20px;
        text-align:center;
    }

    .payment-buttons{
        flex-direction:column;
        gap:15px !important;
    }

    .payment-btn{
        width:100%;
        text-align:center;
        font-size:14px;
        padding:10px 18px;
    }

}

/* TABLET */

@media(min-width:577px) and (max-width:991px){

    .payment-container{
        max-width:760px;
        padding:28px !important;
    }

    .payment-title{
        font-size:30px;
    }

    .table th{
        font-size:15px;
    }

    .table td{
        font-size:14px;
    }

    .payment-img{
        width:65px;
        height:85px;
    }

    .total-box{
        font-size:22px;
    }

}

/* NORMAL LAPTOP */

@media(min-width:992px) and (max-width:1439px){

    .payment-container{
        max-width:980px;
        padding:40px !important;
    }

    .payment-title{
        font-size:36px;
    }

    .table th{
        font-size:17px;
        padding:18px;
    }

    .table td{
        font-size:16px;
        padding:22px 12px;
    }

    .payment-img{
        width:80px;
        height:100px;
    }

    .total-box{
        font-size:28px;
    }

    .payment-btn{
        font-size:16px;
        padding:12px 30px;
    }
    .product-section{
    margin-top:70px !important;
     }

}

/* LARGE LAPTOP */

@media(min-width:1440px){

    .payment-container{
        max-width:1250px;
        padding:55px !important;
        border-radius:24px;
        
    }

    .payment-title{
        font-size:46px;
        margin-bottom:40px !important;
    }

    .table th{
        font-size:22px;
        padding:24px;
    }

    .table td{
        font-size:20px;
        padding:28px 16px;
    }

    .payment-img{
        width:110px;
        height:140px;
        border-radius:14px;
    }

    .total-box{
        font-size:36px;
        margin-top:35px;
    }

    .payment-btn{
        font-size:20px;
        padding:14px 36px;
        border-radius:14px;
    }
    .product-section{
    margin-top:90px !important;
     }

}

/* 4K SCREEN */

@media(min-width:2560px){

    body{
        padding-top:70px;
    }
     .product-section{
    margin-top:120px !important;
     }
    .payment-container{
        max-width:1850px;
        padding:80px !important;
        border-radius:34px;
    }

    .payment-title{
        font-size:68px;
        margin-bottom:55px !important;
    }

    .table th{
        font-size:34px;
        padding:34px;
    }

    .table td{
        font-size:30px;
        padding:40px 20px;
    }

    .payment-img{
        width:170px;
        height:220px;
        border-radius:20px;
    }

    .total-box{
        font-size:52px;
        margin-top:50px;
    }

    .payment-buttons{
        margin-top:60px !important;
        gap:40px !important;
    }

    .payment-btn{
        font-size:30px;
        padding:20px 48px;
        border-radius:18px;
    }

}

</style>



<div class="container mt-5 mb-5 p-4 payment-container product-section">

    <h2 class="text-center mb-4 payment-title">
        Payment Summary
    </h2>



    <div class="table-responsive">

        <table class="table table-bordered align-middle">

            <thead>

                <tr>

                    <th>Image</th>
                    <th>Perfume Name</th>

                </tr>

            </thead>

            <tbody>

                {% for i in data %}

                <tr>

                    <td>

                        <img src="{{i.item.perfume_image.url}}"
                             class="payment-img">

                    </td>

                    <td>

                        {{i.item.perfumename}}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>



    <!-- GRAND TOTAL -->

    <div class="total-box">

        Grand Total : ₹ {{grandtotal}}

    </div>



    <!-- PAYMENT BUTTONS -->

    <div class="d-flex justify-content-center gap-4 payment-buttons">

        <form action="{% url 'cod' %}" method="POST">

            {% csrf_token %}

            <input type="submit"
                   value="Cash On Delivery"
                   class="payment-btn">

        </form>



        <a href="{% url 'upi' %}"
           class="payment-btn">

           UPI

        </a>

    </div>

</div>

{% endblock %}
