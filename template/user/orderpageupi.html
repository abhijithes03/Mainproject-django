{% extends 'common/base3.html' %}

{% block content %}

<style>

body{
    background-color:#f8f9fa;
}

/* CONTAINER */

.success-container{
    min-height:calc(100vh - 160px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px 20px 0 20px;
    margin-top:60px;
    margin-bottom:40px;
}

/* SUCCESS CARD */

.success-card{
    background-color:#ffffff;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    padding:50px 35px;
    text-align:center;
    max-width:500px;
    width:100%;
    transition:0.3s;
}

.success-card:hover{
    transform:translateY(-4px);
}

/* ICON */

.success-icon{
    font-size:70px;
    color:green;
    line-height:1;
}

/* TITLE */

.success-title{
    font-size:34px;
    font-weight:700;
    margin-top:20px;
    color:#111;
}

/* TOTAL */

.total-text{
    font-size:24px;
    font-weight:600;
    margin-top:18px;
    color:#444;
}

/* BUTTON */

.home-btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 28px;
    border-radius:10px;
    background-color:#000;
    color:#fff;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
    font-size:15px;
}

.home-btn:hover{
    background-color:#333;
    color:#fff;
}

/* MOBILE */

@media(max-width:576px){

    .success-container{
        margin-top:30px;
        margin-bottom:20px;
        padding:15px;
    }

    .success-card{
        padding:40px 20px;
        border-radius:16px;
    }

    .success-icon{
        font-size:56px;
    }

    .success-title{
        font-size:28px;
    }

    .total-text{
        font-size:20px;
    }

    .home-btn{
        width:100%;
        font-size:14px;
        padding:10px 18px;
    }

}

/* TABLET */

@media(min-width:577px) and (max-width:991px){

    .success-card{
        max-width:620px;
        padding:50px 35px;
    }

    .success-icon{
        font-size:72px;
    }

    .success-title{
        font-size:36px;
    }

    .total-text{
        font-size:24px;
    }

    .home-btn{
        font-size:15px;
        padding:12px 26px;
    }

}

/* NORMAL LAPTOP */

@media(min-width:992px) and (max-width:1439px){

    .success-card{
        max-width:720px;
        padding:60px 45px;
        border-radius:24px;
    }

    .success-icon{
        font-size:90px;
    }

    .success-title{
        font-size:42px;
        margin-top:24px;
    }

    .total-text{
        font-size:30px;
        margin-top:24px;
    }

    .home-btn{
        font-size:17px;
        padding:14px 32px;
        margin-top:36px;
    }

}

/* LARGE LAPTOP */

@media(min-width:1440px){

    .success-container{
        margin-top:80px;
    }

    .success-card{
        max-width:900px;
        padding:80px 60px;
        border-radius:30px;
    }

    .success-icon{
        font-size:120px;
    }

    .success-title{
        font-size:56px;
        margin-top:30px;
    }

    .total-text{
        font-size:38px;
        margin-top:28px;
    }

    .home-btn{
        font-size:20px;
        padding:16px 40px;
        border-radius:14px;
        margin-top:42px;
    }

}

/* 4K SCREEN */

@media(min-width:2560px){

    .success-container{
        margin-top:120px;
        margin-bottom:80px;
    }

    .success-card{
        max-width:1400px;
        padding:120px 90px;
        border-radius:40px;
    }

    .success-icon{
        font-size:180px;
    }

    .success-title{
        font-size:82px;
        margin-top:40px;
    }

    .total-text{
        font-size:58px;
        margin-top:38px;
    }

    .home-btn{
        font-size:30px;
        padding:22px 55px;
        border-radius:18px;
        margin-top:55px;
    }

}

</style>



<div class="container success-container">

    <div class="success-card">

        <!-- ICON -->

        <div class="success-icon">

            ✔

        </div>



        <!-- TITLE -->

        <h1 class="success-title">

            Order Successful

        </h1>



        <!-- TOTAL -->

        <h2 class="total-text">

            Grand Total : ₹ {{data}}

        </h2>



        <!-- BUTTON -->

        <a href="{% url 'userhome' %}"
           class="home-btn">

           Continue Shopping

        </a>

    </div>

</div>



{% if messages %}

    {% for msg in messages %}

    <script>
        alert('{{msg}}');
    </script>

    {% endfor %}

{% endif %}

{% endblock %}
