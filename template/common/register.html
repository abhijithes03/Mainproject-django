
{% extends 'common/base4.html' %}
{% load static %}
{% block content %}

<style>

/* CONTAINER */

.register-container{
    padding: 10px 15px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */

.register-card{
    width: 100%;
    max-width: 1180px;
    background-color: #ffffff;
    border-radius: 22px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    overflow: hidden;
}

/* LAYOUT */

.register-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
}

/* LEFT SIDE */

.register-left{
    padding: 0;
    height: 100%;
}

/* IMAGE */

.register-img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* RIGHT SIDE */

.register-right{
    padding: 28px 26px;
}

/* TITLE */

.form-title{
    font-size: 24px;
    margin-bottom: 14px;
    font-weight: 700;
}

/* FORM */

.form-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.full-width{
    grid-column: span 2;
}

.form-group{
    display: flex;
    flex-direction: column;
}

.form-label{
    font-size: 13px;
    margin-bottom: 3px;
    font-weight: 600;
    color: #222;
}

/* INPUT */

.form-input{
    width: 100%;
    height: 38px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0 12px;
    font-size: 13px;
    transition: 0.3s;
    background-color: #fff;
}

.form-input:focus{
    outline: none;
    border-color: black;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
}

/* RADIO */

.gender-box{
    display: flex;
    align-items: center;
    height: 34px;
    gap: 14px;
}

.gender-option{
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #444;
}

/* FILE */

.file-input{
    width: 100%;
    border: 1px solid #ddd;
    padding: 6px;
    font-size: 12px;
    border-radius: 10px;
    background-color: #fff;
}

/* BUTTON */

.submit-btn{
    width: 100%;
    height: 40px;
    border: none;
    border-radius: 10px;
    background-color: black;
    color: white;
    font-size: 14px;
    font-weight: 700;
    margin-top: 3px;
    transition: 0.3s ease;
}

.submit-btn:hover{
    background-color: #333;
    transform: translateY(-1px);
}

/* HOME LINK */

.home-link{
    text-decoration: none;
    color: #111;
    font-weight: 600;
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    transition: 0.3s;
}

.home-link:hover{
    color: #555;
}

/* LARGE LAPTOP */

@media(min-width:1440px){

    .register-card{
        max-width: 1400px;
    }

    .register-right{
        padding: 40px 38px;
    }

    .form-title{
        font-size: 32px;
    }

    .form-label{
        font-size: 15px;
    }

    .form-input{
        height: 48px;
        font-size: 15px;
    }

    .submit-btn{
        height: 50px;
        font-size: 16px;
    }

    .home-link{
        font-size: 15px;
    }
}

/* 4K SCREEN */

@media(min-width:2560px){

    .register-container{
        padding: 40px;
    }

    .register-card{
        max-width: 1900px;
        border-radius: 30px;
    }

    .register-right{
        padding: 70px 65px;
    }

    .form-title{
        font-size: 46px;
        margin-bottom: 28px;
    }

    .form-grid{
        gap: 20px;
    }

    .form-label{
        font-size: 20px;
        margin-bottom: 8px;
    }

    .form-input{
        height: 68px;
        font-size: 20px;
        border-radius: 16px;
        padding: 0 20px;
    }

    .gender-box{
        height: 55px;
        gap: 30px;
    }

    .gender-option{
        font-size: 20px;
    }

    .file-input{
        padding: 14px;
        font-size: 18px;
        border-radius: 16px;
    }

    .submit-btn{
        height: 70px;
        font-size: 22px;
        border-radius: 16px;
        margin-top: 10px;
    }

    .home-link{
        font-size: 20px;
        margin-top: 18px;
    }
}

/* TABLET */

@media(max-width:992px){

    .register-card{
        max-width: 760px;
    }

    .register-row{
        grid-template-columns: 1fr;
    }

    .register-left{
        height: 300px;
    }

    .register-right{
        padding: 24px 22px;
    }
}

/* MOBILE */

@media(max-width:768px){

    .register-container{
        padding: 5px 10px 15px;
    }

    .register-card{
        border-radius: 18px;
    }

    .register-left{
        height: 190px;
    }

    .register-img{
        object-fit: cover;
    }

    .register-right{
        padding: 18px 14px;
    }

    .form-grid{
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .full-width{
        grid-column: span 1;
    }

    .form-title{
        font-size: 22px;
    }

    .form-input{
        height: 40px;
    }
}

/* SMALL MOBILE */

@media(max-width:425px){

    .register-left{
        height: 160px;
    }

    .register-right{
        padding: 16px 12px;
    }

    .form-title{
        font-size: 20px;
    }

    .form-input{
        font-size: 12px;
    }

    .submit-btn{
        height: 38px;
        font-size: 13px;
    }
}

</style>

<div class="container register-container">

    <div class="register-card">

        <div class="register-row">

            <!-- LEFT SIDE -->

            <div class="register-left">

                <img src="{% static 'login.png' %}" 
                     alt="" 
                     class="register-img">

            </div>

            <!-- RIGHT SIDE -->

            <div class="register-right">

                <h2 class="form-title text-center">
                    Create Account
                </h2>

                <form action="{% url 'register' %}" 
                      method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="form-grid">

                        <!-- FIRST NAME -->

                        <div class="form-group">

                            <label class="form-label">
                                First Name
                            </label>

                            <input type="text"
                                   name="fname"
                                   class="form-input"
                                   placeholder="Enter First Name">

                        </div>

                        <!-- LAST NAME -->

                        <div class="form-group">

                            <label class="form-label">
                                Last Name
                            </label>

                            <input type="text"
                                   name="lname"
                                   class="form-input"
                                   placeholder="Enter Last Name">

                        </div>

                        <!-- GENDER -->

                        <div class="form-group full-width">

                            <label class="form-label">
                                Gender
                            </label>

                            <div class="gender-box">

                                <label class="gender-option">

                                    <input type="radio"
                                           name="gender"
                                           value="male">

                                    Male

                                </label>

                                <label class="gender-option">

                                    <input type="radio"
                                           name="gender"
                                           value="female">

                                    Female

                                </label>

                            </div>

                        </div>

                        <!-- ADDRESS -->

                        <div class="form-group full-width">

                            <label class="form-label">
                                Address
                            </label>

                            <input type="text"
                                   name="address"
                                   class="form-input"
                                   placeholder="Enter Address">

                        </div>

                        <!-- CITY -->

                        <div class="form-group">

                            <label class="form-label">
                                City
                            </label>

                            <input type="text"
                                   name="city"
                                   class="form-input"
                                   placeholder="Enter City">

                        </div>

                        <!-- STATE -->

                        <div class="form-group">

                            <label class="form-label">
                                State
                            </label>

                            <input type="text"
                                   name="state"
                                   class="form-input"
                                   placeholder="Enter State">

                        </div>

                        <!-- POSTAL -->

                        <div class="form-group">

                            <label class="form-label">
                                Postal Code
                            </label>

                            <input type="text"
                                   name="poscode"
                                   class="form-input"
                                   placeholder="Enter Postal Code">

                        </div>

                        <!-- PHONE -->

                        <div class="form-group">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="text"
                                   name="phone"
                                   class="form-input"
                                   placeholder="Enter Phone Number">

                        </div>

                        <!-- EMAIL -->

                        <div class="form-group">

                            <label class="form-label">
                                E-mail
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-input"
                                   placeholder="Enter E-mail">

                        </div>

                        <!-- USERNAME -->

                        <div class="form-group">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="uname"
                                   class="form-input"
                                   placeholder="Set Username">

                        </div>

                        <!-- PASSWORD -->

                        <div class="form-group">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="pwrd"
                                   class="form-input"
                                   placeholder="Set Password">

                        </div>

                        <!-- PROFILE -->

                        <div class="form-group">

                            <label class="form-label">
                                Profile Photo
                            </label>

                            <input type="file"
                                   name="pimage"
                                   class="file-input">

                        </div>

                        <!-- BUTTON -->

                        <div class="form-group full-width">

                            <input type="submit"
                                   value="Create Account"
                                   class="submit-btn">

                        </div>

                    </div>

                </form>

                <div class="text-center mt-4">
                    <p style="margin-bottom:8px; font-size:14px; color:#555;">
                        If you already have an account,
                    </p>
                    <a href="login" class="home-link">
                        Login here
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

{% if messages %}
    {% for msg in messages %}
        <script>
            alert('{{msg}}');
        </script>
    {% endfor %}
{% endif %}

{% endblock %}
