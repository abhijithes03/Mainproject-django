
<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" 
          rel="stylesheet">

<style>

/* BODY */

body{
    background-color:#ffffff;
    overflow-x:hidden;
}

/* NAVBAR */

.custom-navbar{
    background-color:#111 !important;
    padding:12px 20px;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    margin-bottom: 50px;
}

/* LOGO */

.logo{
    font-family:'Monoton', monospace;
    font-size:26px;
    font-weight:700;
    letter-spacing:-3px;
    text-transform:uppercase;
}

/* NAV LINKS */

.navbar-nav .nav-link{
    color:#fff !important;
    font-size:16px;
    font-weight:500;
    margin:0 10px;
    transition:0.3s;
}

.navbar-nav .nav-link:hover{
    color:#ff9900 !important;
}

/* CART */

.cart-icon{
    font-size:22px;
}

/* USER DROPDOWN */

.dropdown-menu{
    border-radius:12px;
    border:none;
    padding:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.dropdown-item{
    padding:10px 14px;
    border-radius:8px;
    transition:0.3s;
}

.dropdown-item:hover{
    background-color:#111;
    color:#fff;
}

/* FOOTER */

.footer-main{
    background-color:rgb(41,39,39);
    padding:25px 15px;
}

.footer-icons{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}

.footer-icons a{
    width:48px;
    height:48px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    transition:0.3s;
    background-color:rgba(255,255,255,0.08);
}

.footer-icons a:hover{
    background-color:#ff9900;
    transform:translateY(-3px);
}

.footer-bottom{
    background-color:#000;
    color:#fff;
    text-align:center;
    padding:18px 10px;
    font-size:15px;
}

.footer-bottom a{
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

/* MOBILE */

@media(max-width:576px){

    body{
        padding-top:70px;
    }

    .custom-navbar{
        padding:10px 14px;
    }

    .logo{
        font-size:20px;
        letter-spacing:-2px;
    }

    .navbar-toggler{
        padding:4px 8px;
        font-size:14px;
    }

    .navbar-collapse{
        background-color:#111;
        padding:15px;
        border-radius:12px;
        margin-top:12px;
    }

    .navbar-nav .nav-link{
        font-size:15px;
        margin:8px 0;
    }

    .cart-icon{
        font-size:20px;
    }

    .footer-icons a{
        width:40px;
        height:40px;
        font-size:15px;
    }

    .footer-bottom{
        font-size:13px;
        padding:14px 8px;
    }

}

/* TABLET */

@media(min-width:577px) and (max-width:991px){

    body{
        padding-top:80px;
    }

    .custom-navbar{
        padding:14px 20px;
    }

    .logo{
        font-size:24px;
    }

    .navbar-collapse{
        background-color:#111;
        padding:18px;
        border-radius:14px;
        margin-top:14px;
    }

    .navbar-nav .nav-link{
        font-size:16px;
        margin:8px 0;
    }

    .footer-icons a{
        width:45px;
        height:45px;
        font-size:17px;
    }

    .footer-bottom{
        font-size:14px;
    }

}

/* LAPTOP */

@media(min-width:992px) and (max-width:1439px){

    body{
        padding-top:90px;
    }

    .custom-navbar{
        padding:16px 35px;
    }

    .logo{
        font-size:28px;
    }

    .navbar-nav .nav-link{
        font-size:17px;
        margin:0 12px;
    }

    .cart-icon{
        font-size:24px;
    }

    .footer-main{
        padding:30px 20px;
    }

    .footer-icons a{
        width:50px;
        height:50px;
        font-size:18px;
    }

    .footer-bottom{
        font-size:15px;
    }

}

/* LARGE DESKTOP */

@media(min-width:1440px){

    body{
        padding-top:110px;
    }

    .custom-navbar{
        padding:20px 50px;
    }

    .logo{
        font-size:36px;
        letter-spacing:-4px;
    }

    .navbar-nav .nav-link{
        font-size:20px;
        margin:0 16px;
    }

    .cart-icon{
        font-size:28px;
    }

    .dropdown-menu{
        min-width:220px;
    }

    .dropdown-item{
        font-size:17px;
    }

    .footer-main{
        padding:40px 20px;
    }

    .footer-icons{
        gap:18px;
    }

    .footer-icons a{
        width:60px;
        height:60px;
        font-size:22px;
    }

    .footer-bottom{
        font-size:18px;
        padding:22px 10px;
    }

}

/* 4K SCREEN */

@media(min-width:2560px){

    body{
        padding-top:150px;
    }

    .custom-navbar{
        padding:28px 90px;
    }

    .logo{
        font-size:54px;
        letter-spacing:-5px;
    }

    .navbar-nav .nav-link{
        font-size:30px;
        margin:0 24px;
    }

    .cart-icon{
        font-size:42px;
    }

    .navbar-toggler{
        font-size:28px;
        padding:10px 18px;
    }

    .dropdown-menu{
        min-width:320px;
        padding:18px;
        border-radius:20px;
    }

    .dropdown-item{
        font-size:26px;
        padding:16px 18px;
    }

    .footer-main{
        padding:60px 20px;
    }

    .footer-icons{
        gap:24px;
    }

    .footer-icons a{
        width:85px;
        height:85px;
        font-size:34px;
    }

    .footer-bottom{
        font-size:28px;
        padding:28px 10px;
    }

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">

    <div class="container-fluid">

        <!-- LOGO -->

        <a class="navbar-brand logo" href="#">

            <span style="color:#ff0000;">E</span>
            <span style="color:#ff0000;">S</span>
            <span style="color:#ff0000;">S</span>
            <span style="color:#ff9900;">Y</span>
            <span style="color:#ff9900;">R</span>
            <span style="color:#ff9900;">A</span>

        </a>

        <!-- TOGGLER -->

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapsibleNavbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- NAV CONTENT -->

        <div class="collapse navbar-collapse"
             id="collapsibleNavbar">

            <!-- LEFT MENU -->

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">

                    <a class="nav-link"
                       href="{% url 'userhome' %}">

                       Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#">

                       About

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="#footer">

                       Contact

                    </a>

                </li>

            </ul>

            <!-- RIGHT MENU -->

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <!-- CART -->

                <li class="nav-item">

                    <a class="nav-link cart-icon"
                       href="{% url 'cartview' %}">

                       🛒

                    </a>

                </li>

                <!-- USER -->

                <li class="nav-item dropdown">

                    <a class="nav-link dropdown-toggle"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                       User

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item"
                               href="{% url 'profileview' %}">
                               My Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="{% url 'orders' %}">
                               My Orders
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="{% url 'wishview' %}">
                               Wishlist
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               href="{% url 'logout' %}">
                               Logout
                            </a>
                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- PAGE CONTENT -->

{% block content %}
{% endblock %}

<!-- FOOTER -->

<footer id="footer">

    <!-- SOCIAL -->

    <div class="footer-main">

        <div class="container">

            <div class="footer-icons">

                <a href="#"><i class="fab fa-facebook-f"></i></a>

                <a href="#"><i class="fab fa-twitter"></i></a>

                <a href="#"><i class="fab fa-google"></i></a>

                <a href="#"><i class="fab fa-instagram"></i></a>

                <a href="#"><i class="fab fa-linkedin"></i></a>

                <a href="#"><i class="fab fa-github"></i></a>

            </div>

        </div>

    </div>

    <!-- COPYRIGHT -->

    <div class="footer-bottom">

        © 2026 Copyright :

        <a href="#">
            Essyra.com
        </a>

    </div>

</footer>

</body>
</html>
