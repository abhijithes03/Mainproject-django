
{% extends 'common/base5.html' %}
{% load static %}

{% block content %}

<style>
.dashboard-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.dashboard-grid{
    width:100%;
    max-width:1100px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.dashboard-btn{
    height:140px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:24px;
    font-weight:700;
    border-radius:18px;
    background:#000;
    color:#fff;
    transition:0.3s;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    text-transform:capitalize;
}

.dashboard-btn:hover{
    background:#d4a15f;
    color:#000;
    transform:translateY(-5px);
}

/* MOBILE */

@media(max-width:768px){

    .dashboard-grid{
        grid-template-columns:1fr;
    }

    .dashboard-btn{
        height:100px;
        font-size:20px;
    }

}
</style>

<div class="dashboard-container">

    <div class="dashboard-grid">

        <a href="{% url 'home' %}" class="dashboard-btn">
            Home
        </a>

        <a href="{% url 'catgry' %}" class="dashboard-btn">
            Add Category
        </a>

        <a href="{% url 'perfume' %}" class="dashboard-btn">
            Add Perfume
        </a>

        <a href="{% url 'viewperfume' %}" class="dashboard-btn">
            View Perfume
        </a>

        <a href="{% url 'rate' %}" class="dashboard-btn">
            Add Ratings
        </a>

        <a href="{% url 'vorders' %}" class="dashboard-btn">
            View Orders
        </a>

    </div>

</div>

{% endblock %}
