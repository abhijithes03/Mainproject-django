
{% extends 'common/base5.html' %}

{% block content %}

<style>

.edit-container{
    min-height:100vh;
    background:#f5f5f5;
    padding:50px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.edit-card{
    width:100%;
    max-width:800px;
    background:#fff;
    padding:45px;
    border-radius:24px;
    box-shadow:0 8px 30px rgba(0,0,0,0.12);
}

.edit-title{
    text-align:center;
    font-size:38px;
    font-weight:700;
    margin-bottom:35px;
    color:#111;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.full-width{
    grid-column:1 / 3;
}

.form-label{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
    color:#333;
    text-transform:capitalize;
}

.form-input,
.form-select{
    width:100%;
    padding:14px 16px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:0.3s;
    background:#fff;
}

.form-input:focus,
.form-select:focus{
    border-color:#d4a15f;
    box-shadow:0 0 8px rgba(212,161,95,0.4);
}

textarea.form-input{
    resize:none;
    height:120px;
}

.image-preview{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:15px;
}

.image-preview img{
    width:90px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid #ddd;
}

.change-text{
    font-size:15px;
    font-weight:600;
    color:#555;
}

.submit-btn{
    width:100%;
    padding:16px;
    margin-top:35px;
    border:none;
    border-radius:14px;
    background:#000;
    color:#fff;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.submit-btn:hover{
    background:#d4a15f;
    color:#000;
    transform:translateY(-2px);
}

/* MOBILE */

@media(max-width:768px){

    .edit-card{
        padding:30px 22px;
    }

    .edit-title{
        font-size:30px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:auto;
    }

    .image-preview{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>

<div class="edit-container">

    <div class="edit-card">

        <h2 class="edit-title">
            Edit Perfume
        </h2>

        <form action="{% url 'edit' data.id %}" 
              method="POST" 
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">Perfume Name</label>
                    <input type="text"
                           name="pname"
                           value="{{data.perfumename}}"
                           class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Brand</label>
                    <input type="text"
                           name="pbrand"
                           value="{{data.perfumebrand}}"
                           class="form-input">
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Perfume Details</label>
                    <textarea name="pdetails"
                              class="form-input">{{data.perfume_details}}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Price</label>
                    <input type="number"
                           name="pprice"
                           value="{{data.perfume_price}}"
                           class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Stock</label>
                    <input type="number"
                           name="pstock"
                           value="{{data.perfume_stock}}"
                           class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Scent</label>
                    <input type="text"
                           name="pscent"
                           value="{{data.perfume_scent}}"
                           class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Volume</label>
                    <input type="text"
                           name="pvolume"
                           value="{{data.perfume_volume}}"
                           class="form-input">
                </div>

                <div class="form-group full-width">

                    <label class="form-label">
                        Perfume Image
                    </label>

                    {% if data.perfume_image %}

                    <div class="image-preview">

                        <img src="{{data.perfume_image.url}}" alt="">

                        <span class="change-text">
                            Change Image
                        </span>

                    </div>

                    {% endif %}

                    <input type="file"
                           name="pimage"
                           class="form-input">

                </div>

                <div class="form-group full-width">

                    <label class="form-label">
                        Category
                    </label>

                    <select name="pcatid"
                            id="pcatid"
                            class="form-select">

                        <option value="{{data.perfume_category_id}}">
                            {{data.perfume_category}}
                        </option>

                        {% for i in user %}

                        <option value="{{i.id}}">
                            {{i.category}}
                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <input type="submit"
                   value="Update Perfume"
                   class="submit-btn">

        </form>

    </div>

</div>

{% endblock %}
