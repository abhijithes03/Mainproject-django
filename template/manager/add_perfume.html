
{% extends 'common/base5.html' %}

{% block content %}

<style>

.perfume-container{
    min-height:100vh;
    background:#f4f4f4;
    padding:50px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.perfume-card{
    width:100%;
    max-width:750px;
    background:#fff;
    padding:45px;
    border-radius:24px;
    box-shadow:0 8px 30px rgba(0,0,0,0.12);
}

.perfume-title{
    text-align:center;
    font-size:38px;
    font-weight:700;
    margin-bottom:35px;
    color:#111;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full-width{
    grid-column:1 / 3;
}

.form-label{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
    color:#333;
    text-transform:capitalize;
}

.form-input,
.form-select{
    width:100%;
    padding:14px 16px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:0.3s;
    background:#fff;
}

.form-input:focus,
.form-select:focus{
    border-color:#d4a15f;
    box-shadow:0 0 8px rgba(212,161,95,0.4);
}

textarea.form-input{
    resize:none;
    height:120px;
}

.submit-btn{
    width:100%;
    padding:16px;
    margin-top:35px;
    border:none;
    border-radius:14px;
    background:#000;
    color:#fff;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.submit-btn:hover{
    background:#d4a15f;
    color:#000;
    transform:translateY(-2px);
}

/* MOBILE */

@media(max-width:768px){

    .perfume-card{
        padding:30px 22px;
    }

    .perfume-title{
        font-size:30px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .form-group.full-width{
        grid-column:auto;
    }

}

</style>

<div class="perfume-container">

    <div class="perfume-card">

        <h2 class="perfume-title">
            Add Perfume
        </h2>

        <form action="{% url 'perfume' %}" 
              method="POST" 
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">Perfume Name</label>
                    <input type="text" 
                           name="pname" 
                           class="form-input"
                           placeholder="Enter perfume name"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Brand</label>
                    <input type="text" 
                           name="pbrand" 
                           class="form-input"
                           placeholder="Enter perfume brand"
                           required>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Perfume Details</label>
                    <textarea name="pdetails"
                              class="form-input"
                              placeholder="Enter perfume details"
                              required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Price</label>
                    <input type="number" 
                           name="pprice" 
                           class="form-input"
                           placeholder="Enter perfume price"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Stock</label>
                    <input type="number" 
                           name="pstock" 
                           class="form-input"
                           placeholder="Enter stock quantity"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Scent</label>
                    <input type="text" 
                           name="pscent" 
                           class="form-input"
                           placeholder="Enter perfume scent"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label">Perfume Volume</label>
                    <input type="text" 
                           name="pvolume" 
                           class="form-input"
                           placeholder="Enter perfume volume"
                           required>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Perfume Image</label>
                    <input type="file" 
                           name="pimage" 
                           class="form-input"
                           required>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Category</label>

                    <select name="pcatid" 
                            id="pcatid"
                            class="form-select"
                            required>

                        <option value="">-- Select Category --</option>

                        {% for i in data %}
                            <option value="{{i.id}}">
                                {{i.category}}
                            </option>
                        {% endfor %}

                    </select>
                </div>

            </div>

            <input type="submit" 
                   value="Submit"
                   class="submit-btn">

        </form>

    </div>

</div>

{% endblock %}
