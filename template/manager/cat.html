
{% extends 'common/base5.html' %}

{% block content %}

<style>

.category-container{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:#f5f5f5;
}

.category-card{
    width:100%;
    max-width:500px;
    background:#ffffff;
    padding:45px 40px;
    border-radius:22px;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

.category-title{
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:35px;
    color:#111;
}

.form-label{
    display:block;
    font-size:18px;
    font-weight:600;
    margin-bottom:12px;
    color:#333;
}

.form-input{
    width:100%;
    padding:15px 18px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

.form-input:focus{
    border-color:#d4a15f;
    box-shadow:0 0 8px rgba(212,161,95,0.4);
}

.submit-btn{
    width:100%;
    margin-top:28px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-size:18px;
    font-weight:600;
    transition:0.3s;
}

.submit-btn:hover{
    background:#d4a15f;
    color:#000;
    transform:translateY(-2px);
}

/* MOBILE */

@media(max-width:576px){

    .category-card{
        padding:35px 25px;
    }

    .category-title{
        font-size:28px;
    }

}

</style>

<div class="category-container">

    <div class="category-card">

        <h2 class="category-title">Add Category</h2>

        <form action="{% url 'catgry' %}" method="POST">

            {% csrf_token %}

            <label for="category" class="form-label">
                Category Name
            </label>

            <input type="text"
                   name="cate"
                   id="category"
                   class="form-input"
                   placeholder="Enter category"
                   required>

            <input type="submit"
                   value="Submit"
                   class="submit-btn">

        </form>

    </div>

</div>

{% endblock %}
